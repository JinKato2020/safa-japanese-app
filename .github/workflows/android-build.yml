name: safa-japanese-app (Android build)
run-name: "safa-japanese-app — Android build (${{ github.event.head_commit.message || github.ref_name }})"

# =============================================================================
# 聞いて話せる日本語 (com.safa.japanese) — Android ビルド。
#  ・公開リポ=GitHub Actions 無料。手動(workflow_dispatch)で実行。
#  ・正式署名: com.safa.japanese 専用アップロード鍵で署名した AAB(Play提出用) + APK(実機用)。
#    署名Secret: ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
#  ・submodule(safa-shared) 取得に submodules: recursive 必須。
# =============================================================================

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Calculate build number
        run: |
          BUILD_NUMBER=$((1000 + $(git rev-list --count HEAD)))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          APP_VERSION=$(node -p "require('./app.json').expo.version" 2>/dev/null || echo "?")
          echo "::notice::Build number: $BUILD_NUMBER (v$APP_VERSION)"
          echo "## 🤖 聞いて話せる日本語 v$APP_VERSION (Android build $BUILD_NUMBER)" >> $GITHUB_STEP_SUMMARY

      - name: Expo prebuild (Android)
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --clean

      - name: Set versionCode = build number
        run: |
          sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          grep -n "versionCode" android/app/build.gradle | head -1

      - name: Configure release signing
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 --decode > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then echo "::error::keystore empty"; exit 1; fi
          echo "::notice::keystore: $(wc -c < android/app/release.keystore) bytes"
          node -e '
            const fs=require("fs");const p="android/app/build.gradle";let s=fs.readFileSync(p,"utf8");
            if(!s.includes("RELEASE signing (CI)")){
              s=s.replace(/signingConfigs\s*\{/, m=>m+`\n        // RELEASE signing (CI)\n        release {\n            storeFile file("release.keystore")\n            storePassword System.getenv("RELEASE_STORE_PASSWORD")\n            keyAlias System.getenv("RELEASE_KEY_ALIAS")\n            keyPassword System.getenv("RELEASE_KEY_PASSWORD")\n        }`);
            }
            s=s.replace(/signingConfig signingConfigs\.debug/g,"signingConfig signingConfigs.release");
            fs.writeFileSync(p,s);
          '
          if ! grep -q "RELEASE signing (CI)" android/app/build.gradle; then echo "::error::gradle patch failed"; exit 1; fi
          echo "::notice::release signingConfig injected"

      - name: Build AAB + APK (signed release)
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Verify signing (keystore alias)
        run: |
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "AAB=$AAB" >> $GITHUB_ENV
          echo "APK=$APK" >> $GITHUB_ENV
          echo "::notice::AAB: $AAB ($(du -h "$AAB" | cut -f1)) / APK: $APK ($(du -h "$APK" | cut -f1))"
          # APK署名の確認(apksignerがあれば)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner 2>/dev/null | sort | tail -1)
          if [ -n "$APKSIGNER" ]; then "$APKSIGNER" verify --print-certs "$APK" | grep -i "Signer #1 certificate DN" || true; fi

      - name: Upload AAB (Play提出用)
        uses: actions/upload-artifact@v4
        with:
          name: safa-japanese-android-aab-build-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK (実機用・署名済)
        uses: actions/upload-artifact@v4
        with:
          name: safa-japanese-android-apk-build-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
